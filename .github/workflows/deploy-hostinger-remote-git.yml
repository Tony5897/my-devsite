name: Deploy to Hostinger (remote git pull)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    concurrency:
      group: hostinger-remote-git-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout (for completeness)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Deploy via SSH (git pull on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            set -e
            TARGET_DIR=${{ secrets.HOSTINGER_TARGET_DIR && format('"{0}"', secrets.HOSTINGER_TARGET_DIR) || '"/home/u563366180/public_html"' }}
            echo "Target directory: $TARGET_DIR"
            cd "$TARGET_DIR"
            if [ ! -d .git ]; then
              echo "ERROR: $TARGET_DIR is not a git repository. Your domain likely serves static files here without git. Either initialize a repo here or switch to an SCP upload workflow." >&2
              exit 1
            fi
            git status || true
            git remote -v || true
            git fetch origin main
            git reset --hard origin/main
            git rev-parse HEAD


